<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Контакты и как добраться · Гармония</title>
  <meta name="description" content="Адрес, телефон, мессенджеры, режим работы — студия «Гармония» у Преображенской площади." />
  <meta name="theme-color" content="#A8607A" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Marck+Script&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css?v=6" />
</head>
<body class="page-sub">
  <!-- TOPBAR -->
  <header class="topbar" id="topbar">
    <a class="topbar__brand" href="index.html">
      <span class="topbar__mark">✦</span>
      <span data-bind="name">—</span>
    </a>
    <nav class="topbar__nav">
      <a href="uslugi.html">Услуги</a>
      <a href="raboty.html">Работы</a>
      <a href="otzyvy.html">Отзывы</a>
      <a href="mastera.html">Мастера</a>
      <a href="kontakty.html" class="is-active">Контакты</a>
    </nav>
    <a class="topbar__cta" data-bind-attr="href:phone_tel">Позвонить</a>
  </header>

  <!-- КОНТАКТЫ -->
  <section class="section section--dark section--contacts" id="contacts">
    <div class="contacts">
      <div class="contacts__col contacts__col--info">
        <span class="eyebrow eyebrow--inverse">05 / Контакты</span>
        <h2 class="section__title section__title--inverse">
          Заходи<br /><em>в гости</em>
        </h2>

        <div class="contacts__block">
          <div class="contacts__label">Адрес</div>
          <div class="contacts__value" data-bind="address">—</div>
          <div class="contacts__sub" data-bind="metro">—</div>
        </div>

        <div class="contacts__block">
          <div class="contacts__label">Режим работы</div>
          <ul class="hours" id="hours-list">
            <!-- наполняется из config.hours -->
          </ul>
        </div>

        <div class="contacts__block">
          <div class="contacts__label">Связь</div>
          <a class="contacts__phone" data-bind-attr="href:phone_tel">
            <span data-bind="phone">—</span>
          </a>
          <div class="contacts__socials" id="contacts-socials">
            <!-- наполняется из config.* -->
          </div>
        </div>
      </div>

      <div class="contacts__col contacts__col--map">
        <div class="map" id="map">
          <!-- iframe вставляется через script.js, если задан config.map_embed_src -->
        </div>
      </div>
    </div>
  </section>

  <!-- ФУТЕР -->
  <footer class="footer">
    <div class="footer__brand">
      <span class="footer__mark">✦</span>
      <span data-bind="name">—</span>
    </div>
    <div class="footer__est">
      С <span data-bind="est_year">—</span> года · Москва
    </div>
    <div class="footer__signature">
      Сайт сделан под заказ · <span class="footer__year" id="footer-year"></span>
    </div>
  </footer>

  <a class="fab" data-bind-attr="href:phone_tel" aria-label="Позвонить">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
    </svg>
    <span class="fab__label">Позвонить</span>
  </a>

  <script src="config.js?v=5"></script>
  <script src="script.js?v=2"></script>
</body>
</html>
